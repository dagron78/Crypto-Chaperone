<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Chaperone</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0a0c0f;--surface:#111418;--surface2:#181c22;--surface3:#1e2430;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaed;--text2:#8a9099;--text3:#545a63;
  --green:#00e5a0;--green-dim:rgba(0,229,160,0.12);--green-border:rgba(0,229,160,0.25);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.1);--amber-border:rgba(245,166,35,0.25);
  --red:#ff4d6a;--red-dim:rgba(255,77,106,0.1);--red-border:rgba(255,77,106,0.25);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.1);
  --sol:#9945ff;--sol-dim:rgba(153,69,255,0.12);
  --eth:#627eea;--eth-dim:rgba(98,126,234,0.12);
  --base:#0052ff;--base-dim:rgba(0,82,255,0.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}
.shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);}
.main{display:flex;flex-direction:column;overflow:hidden;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo-mark{font-size:11px;font-weight:500;letter-spacing:0.2em;color:var(--green);text-transform:uppercase;}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--sans);margin-top:2px;}
.chain-switcher{padding:12px;border-bottom:1px solid var(--border);}
.chain-label{font-size:9px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;font-family:var(--sans);}
.chain-btns{display:flex;gap:4px;}
.chain-btn{flex:1;padding:6px 4px;font-size:10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--mono);text-align:center;transition:all 0.15s;}
.chain-btn.active.eth{border-color:var(--eth);color:var(--eth);background:var(--eth-dim);}
.chain-btn.active.sol{border-color:var(--sol);color:var(--sol);background:var(--sol-dim);}
.chain-btn.active.arb{border-color:#12aaff;color:#12aaff;background:rgba(18,170,255,0.1);}
.chain-btn.active.base{border-color:var(--base);color:var(--base);background:var(--base-dim);}
.chain-btn:hover:not(.active){background:var(--surface2);}
.nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-section{padding:10px 12px 4px;font-size:9px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;font-family:var(--sans);}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:11px;color:var(--text2);transition:all 0.1s;border-left:2px solid transparent;font-family:var(--sans);}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--green);border-left-color:var(--green);background:var(--green-dim);}
.wallet-area{padding:12px;border-top:1px solid var(--border);}
.wallet-label{font-size:9px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;font-family:var(--sans);margin-bottom:6px;}
.wallet-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:10px;color:var(--text);font-family:var(--mono);outline:none;}
.wallet-input:focus{border-color:var(--green-border);}
.wallet-input::placeholder{color:var(--text3);}
.wallet-go{width:100%;margin-top:5px;padding:6px;font-size:10px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:6px;color:var(--green);cursor:pointer;font-family:var(--mono);transition:all 0.15s;}
.wallet-go:hover{background:rgba(0,229,160,0.2);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.page-title{font-size:11px;letter-spacing:0.1em;color:var(--text2);font-family:var(--sans);}
.status-bar{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text3);font-family:var(--sans);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.live-price{font-family:var(--mono);font-size:10px;color:var(--text2);}
.content{flex:1;overflow-y:auto;padding:20px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.card-title{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--sans);display:flex;justify-content:space-between;align-items:center;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{font-size:10px;padding:7px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--sans);letter-spacing:0.05em;transition:all 0.1s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tx-input-row{display:flex;gap:8px;margin-bottom:12px;}
.tx-field{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--text);font-family:var(--mono);outline:none;}
.tx-field:focus{border-color:rgba(0,229,160,0.4);}
.tx-field::placeholder{color:var(--text3);}
.btn{padding:9px 16px;font-size:10px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--mono);letter-spacing:0.05em;transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn-primary{border-color:var(--green-border);background:var(--green-dim);color:var(--green);}
.btn-primary:hover{background:rgba(0,229,160,0.2);}
.btn-danger{border-color:var(--red-border);background:var(--red-dim);color:var(--red);}
.btn-sm{padding:5px 10px;font-size:9px;}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.data-row:last-child{border-bottom:none;}
.dr-key{color:var(--text3);font-family:var(--sans);font-size:11px;}
.dr-val{color:var(--text);font-family:var(--mono);font-size:11px;text-align:right;}
.dr-val.green{color:var(--green);}
.dr-val.amber{color:var(--amber);}
.dr-val.red{color:var(--red);}
.dr-val.addr{color:var(--blue);font-size:10px;}
.risk-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.risk-item:last-child{border-bottom:none;}
.risk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.risk-dot.ok{background:var(--green);}
.risk-dot.warn{background:var(--amber);}
.risk-dot.danger{background:var(--red);}
.risk-text{font-size:11px;color:var(--text);font-family:var(--sans);line-height:1.5;}
.risk-sub{font-size:10px;color:var(--text3);font-family:var(--sans);margin-top:2px;}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.diff-cell{background:var(--surface2);border-radius:8px;padding:10px 12px;}
.diff-label{font-size:10px;color:var(--text3);font-family:var(--sans);margin-bottom:4px;}
.diff-val{font-size:13px;font-weight:500;font-family:var(--mono);}
.diff-val.neg{color:var(--red);}
.diff-val.pos{color:var(--green);}
.diff-val.neutral{color:var(--text2);}
.trace{background:var(--surface2);border-radius:8px;padding:12px;font-size:10px;font-family:var(--mono);line-height:1.9;color:var(--text3);}
.t-ok{color:var(--green);}
.t-info{color:var(--blue);padding-left:14px;display:block;}
.explain-block{border-left:2px solid var(--surface3);padding:10px 14px;margin-bottom:10px;font-size:12px;font-family:var(--sans);line-height:1.7;color:var(--text2);border-radius:0 6px 6px 0;background:var(--surface2);}
.explain-block.warn{border-left-color:var(--amber);}
.explain-block.danger{border-left-color:var(--red);}
.explain-block.info{border-left-color:var(--blue);}
.explain-block.ok{border-left-color:var(--green);}
.explain-block strong{color:var(--text);font-weight:500;}
.explain-block code{font-family:var(--mono);font-size:11px;color:var(--green);}
.gas-grid{display:flex;gap:6px;}
.gas-opt{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;text-align:center;transition:all 0.15s;}
.gas-opt.selected{border-color:var(--green-border);background:var(--green-dim);}
.gas-opt:hover:not(.selected){border-color:var(--border2);background:var(--surface2);}
.gas-speed{font-size:9px;color:var(--text3);font-family:var(--sans);text-transform:uppercase;letter-spacing:0.1em;}
.gas-gwei{font-size:12px;color:var(--text);font-family:var(--mono);margin:2px 0;}
.gas-usd{font-size:9px;color:var(--text3);font-family:var(--sans);}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.15s;}
.action-card:hover{border-color:var(--border2);background:var(--surface2);}
.action-card.selected{border-color:var(--green-border);background:var(--green-dim);}
.ac-name{font-size:11px;color:var(--text);font-family:var(--sans);font-weight:500;margin-bottom:3px;}
.ac-desc{font-size:10px;color:var(--text3);font-family:var(--sans);line-height:1.4;}
.ac-chain{font-size:9px;margin-top:6px;padding:2px 6px;border-radius:99px;display:inline-block;font-family:var(--mono);}
.ac-chain.eth{background:var(--eth-dim);color:var(--eth);border:1px solid rgba(98,126,234,0.25);}
.ac-chain.sol{background:var(--sol-dim);color:var(--sol);border:1px solid rgba(153,69,255,0.25);}
.ac-chain.arb{background:rgba(18,170,255,0.1);color:#12aaff;border:1px solid rgba(18,170,255,0.25);}
.form-group{margin-bottom:12px;}
.form-label{font-size:10px;color:var(--text3);font-family:var(--sans);letter-spacing:0.05em;margin-bottom:5px;display:flex;justify-content:space-between;}
.form-label span{color:var(--text2);}
.token-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;}
.token-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-family:var(--mono);white-space:nowrap;}
.token-badge.sol{background:var(--sol-dim);color:var(--sol);border:1px solid rgba(153,69,255,0.3);}
.token-badge.eth{background:var(--eth-dim);color:var(--eth);border:1px solid rgba(98,126,234,0.3);}
.token-badge.base{background:var(--base-dim);color:var(--base);border:1px solid rgba(0,82,255,0.3);}
.token-badge.usdc{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,159,255,0.3);}
.token-badge.green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.apy-display{display:flex;align-items:baseline;gap:6px;padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:12px;}
.apy-num{font-size:24px;font-weight:500;font-family:var(--mono);color:var(--green);}
.apy-label{font-size:11px;color:var(--text3);font-family:var(--sans);}
.apy-period{font-size:10px;color:var(--text3);font-family:var(--sans);margin-left:auto;}
.approval-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.approval-row:last-child{border-bottom:none;}
.approval-protocol{font-family:var(--sans);color:var(--text);flex:1;font-size:11px;}
.approval-token{color:var(--text2);font-family:var(--mono);font-size:10px;}
.approval-amount{font-family:var(--mono);font-size:10px;color:var(--amber);}
.approval-amount.unlimited{color:var(--red);}
.revoke-btn{font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--red-border);background:var(--red-dim);color:var(--red);cursor:pointer;font-family:var(--mono);}
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.port-stat{background:var(--surface2);border-radius:8px;padding:10px 12px;}
.port-label{font-size:9px;color:var(--text3);font-family:var(--sans);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.port-val{font-size:16px;font-weight:500;font-family:var(--mono);}
.port-val.green{color:var(--green);}
.port-val.amber{color:var(--amber);}
.loading{display:flex;align-items:center;gap:8px;padding:12px;font-size:11px;color:var(--text3);font-family:var(--sans);}
.spinner{width:12px;height:12px;border:1.5px solid var(--surface3);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.badge{font-size:9px;padding:2px 7px;border-radius:99px;font-family:var(--mono);display:inline-flex;align-items:center;gap:3px;}
.badge.verified{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.badge.unverified{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border);}
.badge.live{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,159,255,0.3);}
.badge.demo{background:var(--surface3);color:var(--text3);border:1px solid var(--border);}
.tag{font-size:9px;padding:1px 6px;border-radius:4px;font-family:var(--mono);display:inline-block;}
.tag.new{background:var(--green-dim);color:var(--green);}
.tag.hot{background:var(--amber-dim);color:var(--amber);}
.ai-panel{display:flex;flex-direction:column;}
.ai-messages{overflow-y:auto;padding-bottom:12px;max-height:calc(100vh - 280px);min-height:200px;}
.ai-messages::-webkit-scrollbar{width:3px;}
.ai-messages::-webkit-scrollbar-thumb{background:var(--surface3);}
.ai-msg{margin-bottom:12px;}
.ai-msg-role{font-size:9px;letter-spacing:0.12em;color:var(--text3);font-family:var(--sans);text-transform:uppercase;margin-bottom:4px;}
.ai-msg-body{font-size:12px;font-family:var(--sans);line-height:1.7;color:var(--text2);background:var(--surface2);border-radius:8px;padding:10px 12px;}
.ai-msg-body.user{background:var(--green-dim);color:var(--text);border:1px solid var(--green-border);}
.ai-msg-body strong{color:var(--text);font-weight:500;}
.ai-msg-body code{font-family:var(--mono);font-size:11px;color:var(--green);}
.ai-input-row{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border);}
.ai-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--text);font-family:var(--sans);outline:none;}
.ai-input:focus{border-color:rgba(0,229,160,0.4);}
.ai-input::placeholder{color:var(--text3);}
.api-row{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
.api-label{font-size:10px;color:var(--text3);font-family:var(--sans);width:120px;flex-shrink:0;}
.api-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:10px;color:var(--text);font-family:var(--mono);outline:none;}
.api-input:focus{border-color:rgba(0,229,160,0.4);}
.api-status-ok{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--green-dim);color:var(--green);white-space:nowrap;}
.api-status-none{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--surface3);color:var(--text3);white-space:nowrap;}
.vault-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.action-row{display:flex;gap:8px;margin-top:12px;}
.proto-badge{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:12px;}
.proto-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--green-dim);color:var(--green);}
.proto-name{font-size:13px;color:var(--text);font-family:var(--sans);font-weight:500;}
.proto-tvl{font-size:10px;color:var(--text3);font-family:var(--sans);}
.error-note{font-size:11px;color:var(--amber);font-family:var(--sans);padding:8px 12px;background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:6px;margin-bottom:10px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;}
.nft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.nft-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.15s;}
.nft-card:hover{border-color:var(--border2);}
.nft-img-wrap{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.nft-no-img{color:var(--text3);font-size:28px;}
.nft-img{width:100%;height:100%;object-fit:cover;}
.nft-name{font-size:10px;color:var(--text);font-family:var(--sans);padding:6px 8px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nft-coll{font-size:9px;color:var(--text3);font-family:var(--sans);padding:0 8px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ens-badge{font-size:9px;padding:2px 7px;border-radius:99px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,159,255,0.3);font-family:var(--mono);margin-left:6px;}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">⬡ Chaperone</div>
    <div class="logo-sub">Multi-chain DeFi guide · v2</div>
  </div>
  <div class="chain-switcher">
    <div class="chain-label">Network</div>
    <div class="chain-btns">
      <button class="chain-btn active eth" id="btn-eth" onclick="switchChain('eth')">ETH</button>
      <button class="chain-btn sol" id="btn-sol" onclick="switchChain('sol')">SOL</button>
      <button class="chain-btn arb" id="btn-arb" onclick="switchChain('arb')">ARB</button>
      <button class="chain-btn base" id="btn-base" onclick="switchChain('base')">BASE</button>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-section">Inspect</div>
    <div class="nav-item active" id="nav-inspector" onclick="showPage('inspector',this)"><span>⬡</span> TX Inspector</div>
    <div class="nav-item" id="nav-approvals" onclick="showPage('approvals',this)"><span>⚠</span> Approvals</div>
    <div class="nav-section">DeFi Actions</div>
    <div class="nav-item" id="nav-stake" onclick="showPage('stake',this)"><span>◈</span> Stake / Unstake</div>
    <div class="nav-item" id="nav-vaults" onclick="showPage('vaults',this)"><span>◫</span> Yield Vaults</div>
    <div class="nav-item" id="nav-swap" onclick="showPage('swap',this)"><span>⇄</span> Swap</div>
    <div class="nav-item" id="nav-lend" onclick="showPage('lend',this)"><span>◎</span> Lend / Borrow</div>
    <div class="nav-section">Intelligence</div>
    <div class="nav-item" id="nav-ai" onclick="showPage('ai',this)"><span>◉</span> AI Advisor</div>
    <div class="nav-item" id="nav-portfolio" onclick="showPage('portfolio',this)"><span>◧</span> Portfolio</div>
    <div class="nav-item" id="nav-nfts" onclick="showPage('nfts',this)"><span>◈</span> NFTs</div>
    <div class="nav-section">Config</div>
    <div class="nav-item" id="nav-settings" onclick="showPage('settings',this)"><span>◌</span> API Keys</div>
  </nav>
  <div class="wallet-area">
    <div class="wallet-label">Wallet</div>
    <input class="wallet-input" id="wallet-addr" placeholder="0x… or Sol address" value="0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045" />
    <button class="wallet-go" onclick="loadWallet()">Load wallet →</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <span class="page-title" id="page-title">TX INSPECTOR</span>
    <div class="status-bar">
      <div class="pulse"></div>
      <span id="chain-label">Ethereum Mainnet</span>
      <span id="block-num" style="color:var(--text3)">—</span>

// ═══════════════════════ RPC HELPERS ═════════════════════
function getEvmRpc(chain){
  const k=S.keys.alchemy;
  if(k){
    if(chain==='eth')  return `https://eth-mainnet.g.alchemy.com/v2/${k}`;
    if(chain==='arb')  return `https://arb-mainnet.g.alchemy.com/v2/${k}`;
    if(chain==='base') return `https://base-mainnet.g.alchemy.com/v2/${k}`;
  }
  if(chain==='arb')  return 'https://arb1.arbitrum.io/rpc';
  if(chain==='base') return 'https://mainnet.base.org';
  return 'https://eth.llamarpc.com';
}
function getSolRpc(){
  return S.keys.helius ? `https://mainnet.helius-rpc.com/?api-key=${S.keys.helius}` : 'https://api.mainnet-beta.solana.com';
}
async function evmRpc(method,params,chain){
  chain=chain||S.chain;
  try{
    const r=await fetch(getEvmRpc(chain==='sol'?'eth':chain),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method,params})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    return d.result;
  }catch(e){console.warn('EVM RPC',e.message);return null;}
}
async function solRpc(method,params){
  try{
    const r=await fetch(getSolRpc(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method,params})});
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    return d.result;
  }catch(e){console.warn('SOL RPC',e.message);return null;}
}
async function etherscanGet(params){
  const key=S.keys.etherscan||'YourApiKeyToken';
  const base={eth:'https://api.etherscan.io/api',arb:'https://api.arbiscan.io/api',base:'https://api.basescan.org/api'}[S.chain]||'https://api.etherscan.io/api';
  const qs=Object.entries({...params,apikey:key}).map(([k,v])=>`${k}=${v}`).join('&');
  try{const r=await fetch(`${base}?${qs}`);return await r.json();}catch(e){return null;}
}

// ═══════════════════════ ENS ══════════════════════════════
async function resolveENS(name){
  try{
    const r=await fetch(`https://api.ensdata.net/${name}`);
    if(!r.ok) return null;
    const d=await r.json();
    return d.address||null;
  }catch(e){return null;}
}

// ═══════════════════════ ERC-20 TOKENS ════════════════════
async function fetchEvmTokens(wallet){
  if(!S.keys.alchemy) return[];
  const res=await evmRpc('alchemy_getTokenBalances',[wallet,'erc20']);
  if(!res?.tokenBalances) return[];
  const nonzero=res.tokenBalances
    .filter(t=>t.tokenBalance&&BigInt(t.tokenBalance)>0n)
    .slice(0,8);
  if(!nonzero.length) return[];
  const metas=await Promise.all(nonzero.map(t=>evmRpc('alchemy_getTokenMetadata',[t.contractAddress])));
  return nonzero.map((t,i)=>{
    const m=metas[i]||{};
    const dec=m.decimals||18;
    const bal=Number(BigInt(t.tokenBalance))/Math.pow(10,dec);
    return{symbol:m.symbol||t.contractAddress.slice(0,8),name:m.name||'Unknown',balance:bal>0.0001?bal.toFixed(4):'<0.0001'};
  });
}

// ═══════════════════════ LIVE DATA ════════════════════════
async function fetchPrices(){

    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum,solana,bitcoin&vs_currencies=usd');

async function fetchBlockNum(){

async function fetchGasData(){

  try{
    const gasPriceHex=await evmRpc('eth_gasPrice',[]);

    const slow=(baseGwei*0.8).toFixed(1),mid=baseGwei.toFixed(1),fast=(baseGwei*1.4).toFixed(1);
    const ep=S.prices.eth||2500;
    const gl=65000;
    S.gasData={slow,mid,fast,unit:'gwei',usd:[
      ((parseFloat(slow)*1e9*gl)/1e18*ep).toFixed(3),

      ((parseFloat(fast)*1e9*gl)/1e18*ep).toFixed(3)
    ]};

async function fetchLlamaYields(){

    const d=await r.json();

    S.vaults=(d.data||[])
      .filter(p=>targets.some(t=>(p.project||'').toLowerCase().includes(t))&&p.apy>0&&p.tvlUsd>500000)

async function fetchPortfolio(){
  try{
    if(S.chain==='sol'){
      const w=S.wallet;
      const [balRes,tokRes]=await Promise.all([

// ═══════════════════════ NFTS ═════════════════════════════
async function fetchNFTs(){
  S.nftData=null;renderPage();
  try{
    if(S.chain==='sol'){
      if(!S.keys.helius){S.nftData={nfts:[],error:'Helius API key required for Solana NFTs — add it in API Keys'};renderPage();return;}
      const r=await fetch(`https://mainnet.helius-rpc.com/?api-key=${S.keys.helius}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getAssetsByOwner',
          params:{ownerAddress:S.wallet,page:1,limit:24,displayOptions:{showFungible:false}}})
      });
      const d=await r.json();
      const solSpam=/^(https?:|Visit|Claim|www\.|Free |You have)/i;
      const nfts=(d.result?.items||[])
        .filter(n=>!n.burnt&&n.content?.metadata?.name&&!solSpam.test(n.content.metadata.name))
        .map(n=>({
          name:n.content.metadata.name,
          image:n.content?.files?.[0]?.uri||n.content?.links?.image||null,
          collection:n.grouping?.[0]?.group_value?.slice(0,20)||'—',id:n.id
        }));
      S.nftData={type:'sol',nfts};
    } else {
      if(!S.keys.alchemy){S.nftData={nfts:[],error:'Alchemy API key required for NFTs — add it in API Keys'};renderPage();return;}
      const nftBase={eth:`https://eth-mainnet.g.alchemy.com/nft/v3/${S.keys.alchemy}`,arb:`https://arb-mainnet.g.alchemy.com/nft/v3/${S.keys.alchemy}`,base:`https://base-mainnet.g.alchemy.com/nft/v3/${S.keys.alchemy}`};
      const r=await fetch(`${nftBase[S.chain]||nftBase.eth}/getNFTsForOwner?owner=${S.wallet}&pageSize=50&excludeFilters[]=SPAM&excludeFilters[]=AIRDROPS`);
      const d=await r.json();
      const spamName=/^(https?:|Visit|Claim|www\.|Free |You have|Congratulations)/i;
      const nfts=(d.ownedNfts||[])
        .filter(n=>!n.spamInfo?.isSpam&&n.contract?.name&&!spamName.test(n.name||''))
        .map(n=>({
          name:n.name||n.contract?.name||'NFT #'+n.tokenId,
          image:n.image?.thumbnailUrl||n.image?.cachedUrl||null,
          collection:n.contract?.name||'—',
          tokenId:n.tokenId,contract:n.contract?.address
        }));
      S.nftData={type:'evm',nfts};
    }
  }catch(e){S.nftData={nfts:[],error:'Error loading NFTs: '+e.message};}
  renderPage();
}

// ═══════════════════════ TX DECODERS ═════════════════════
const SEL={
  '0xa9059cbb':'transfer(address,uint256)',
  '0x095ea7b3':'approve(address,uint256)',
  '0x23b872dd':'transferFrom(address,address,uint256)',
  '0x38ed1739':'swapExactTokensForTokens(…)',
  '0x7ff36ab5':'swapExactETHForTokens(…)',
  '0x18cbafe5':'swapExactTokensForETH(…)',
  '0x2e1a7d4d':'withdraw(uint256)',
  '0xd0e30db0':'deposit()',
  '0x6e553f65':'deposit(uint256,address)',
  '0xe2bbb158':'deposit(uint256,uint256)',
};

function analyzeEvmRisks(sel,tx,verified,cname){
  const r=[];
  r.push(verified
    ?{level:'ok',label:`Contract verified: ${cname}`,sub:'Source code is publicly readable'}
    :{level:'warn',label:'Contract not verified on Etherscan',sub:'Cannot inspect source — review calldata carefully'});
  if(sel==='0x095ea7b3'){
    const amtHex=(tx.input||'').slice(74,138);
    const isUnlimited=BigInt('0x'+amtHex)>BigInt('0x'+'f'.repeat(60));
    r.push(isUnlimited
      ?{level:'danger',label:'UNLIMITED token approval',sub:'Grants permanent access to ALL tokens of this type. Revoke when done.'}
      :{level:'warn',label:'Token approval granted',sub:'Gives spending permission to a contract'});
  } else if(sel==='0xa9059cbb'){
    r.push({level:'ok',label:'Standard ERC-20 transfer — no approvals',sub:'No spending permissions created'});
  } else if(['0x38ed1739','0x7ff36ab5','0x18cbafe5'].includes(sel)){
    r.push({level:'warn',label:'DEX swap — verify slippage',sub:'Check minimum received amount'});
    r.push({level:'warn',label:'MEV / sandwich-attack exposure',sub:'Use Flashbots Protect for large swaps on mainnet'});
  }
  if(!tx.to) r.push({level:'danger',label:'Contract deployment',sub:'This deploys new bytecode to the chain'});
  return r;
}

function analyzeSolanaRisks(prog,fn){
  const r=[];
  const canonical=['System Program','SPL Token Program'];
  r.push(canonical.includes(prog)
    ?{level:'ok',label:`${prog} — canonical runtime`,sub:'No third-party contract involved'}
    :{level:'warn',label:`Third-party program: ${prog}`,sub:'Verify this program ID matches official deployment'});
  if(fn.includes('swap')||fn.includes('route'))
    r.push({level:'warn',label:'DEX swap — verify min output',sub:'Jupiter routes across multiple pools'});
  r.push({level:'ok',label:'Per-transaction authorization (no persistent approvals)',sub:'Lower residual risk than EVM approve model'});
  return r;
}

async function fetchEvmTx(hash){
  const[tx,receipt]=await Promise.all([evmRpc('eth_getTransactionByHash',[hash]),evmRpc('eth_getTransactionReceipt',[hash])]);
  if(!tx) return null;
  const sel=tx.input?.slice(0,10)||'0x';
  let fn=sel==='0x'||tx.input==='0x'?'ETH Transfer (native)':(SEL[sel]||`${sel} (unknown function)`);
  let verified=false,cname=tx.to||'—';
  if(tx.to&&S.keys.etherscan){
    const res=await etherscanGet({module:'contract',action:'getsourcecode',address:tx.to});
    if(res?.result?.[0]?.ContractName){
      cname=res.result[0].ContractName;
      verified=res.result[0].ABI!=='Contract source code not verified';
    }
  }
  const valEth=parseInt(tx.value||'0x0',16)/1e18;
  const gpGwei=parseInt(tx.gasPrice||'0x0',16)/1e9;
  const gasUsed=receipt?parseInt(receipt.gasUsed,16):parseInt(tx.gas,16);
  const gasCostEth=(gpGwei*1e9*gasUsed)/1e18;
  return{
    hash,fn,sel,contract:tx.to||'—',contractName:cname,verified,
    from:tx.from,
    value:valEth>0?`${valEth.toFixed(6)} ETH`:'0',
    valueUsd:valEth>0?`$${(valEth*(S.prices.eth||2500)).toFixed(2)}`:'',
    gasUsed:gasUsed.toLocaleString(),gasPrice:`${gpGwei.toFixed(2)} gwei`,
    gasCostEth:gasCostEth.toFixed(6),gasCostUsd:(gasCostEth*(S.prices.eth||2500)).toFixed(2),
    status:receipt?(receipt.status==='0x1'?'success':'failed'):'pending',
    blockNumber:tx.blockNumber?parseInt(tx.blockNumber,16).toLocaleString():'pending',
    inputData:(tx.input||'').slice(0,100)+((tx.input||'').length>100?'…':''),
    risks:analyzeEvmRisks(sel,tx,verified,cname),
    sim:{ethDelta:valEth>0?`−${valEth.toFixed(6)} ETH`:`−${gasCostEth.toFixed(6)} ETH (gas)`,
         out:valEth>0?`−${valEth.toFixed(4)} ETH`:'—',
         recipientDelta:valEth>0?`+${valEth.toFixed(4)} ETH`:'see token events',
         newApprovals:sel==='0x095ea7b3'?'⚠ approval granted':'none'}
  };
}

async function fetchSolanaTx(sig){
  const tx=await solRpc('getTransaction',[sig,{encoding:'jsonParsed',maxSupportedTransactionVersion:0}]);
  if(!tx) return null;
  const ix=tx.transaction?.message?.instructions||[];
  const meta=tx.meta||{};
  const prog=ix[0]?.programId||ix[0]?.program||'';
  let programName='Unknown Program',fn='instruction';
  if(prog==='11111111111111111111111111111111'){programName='System Program';fn='transfer (native SOL)';}
  else if(prog==='TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA'){programName='SPL Token Program';fn=ix[0]?.parsed?.type||'token instruction';}
  else if(prog.startsWith('JUP')||prog.startsWith('J1toso')){programName='Jupiter Aggregator';fn='route swap';}
  else if(prog==='MarBmsSgKXdrN1egZf5sqe1TMai9K1rChYNDJgjq7aD'){programName='Marinade Finance';fn='liquid stake';}
  else if(prog==='Jito4APyf642JPZPx3hGc6WWJ8zPKtRbRs4P815Pouu'){programName='Jito Staking';fn='deposit';}
  else{programName=prog.slice(0,18)+'…';}
  const feeSol=((meta.fee||5000)/1e9).toFixed(6);
  const feeUsd=(parseFloat(feeSol)*(S.prices.sol||150)).toFixed(4);
  const keys=tx.transaction?.message?.accountKeys||[];
  const pre=meta.preBalances||[];
  const post=meta.postBalances||[];
  const changes=keys.map((k,i)=>({addr:typeof k==='string'?k:k.pubkey,delta:((post[i]||0)-(pre[i]||0))/1e9})).filter(c=>Math.abs(c.delta)>0.000001);
  return{
    hash:sig,fn,contract:programName,contractName:programName,verified:['System Program','SPL Token Program'].includes(programName),
    from:typeof keys[0]==='string'?keys[0]:keys[0]?.pubkey||'—',
    slot:(tx.slot||'').toString(),feeSol,feeUsd,
    status:meta.err?'failed':'success',
    balanceChanges:changes.slice(0,4),
    risks:analyzeSolanaRisks(programName,fn),
    sim:{ethDelta:`−${feeSol} SOL (fee)`,
         out:changes.find(c=>c.delta<0)?`${changes.find(c=>c.delta<0).delta.toFixed(4)} SOL`:'—',
         recipientDelta:changes.find(c=>c.delta>0)?`+${changes.find(c=>c.delta>0).delta.toFixed(4)} SOL`:'—',
         newApprovals:'N/A (per-tx auth model)'}
  };
}

async function fetchApprovals(){
  if(S.chain==='sol') return[
    {protocol:'Raydium AMM v4',token:'USDC',amount:'Unlimited',unlimited:true},
    {protocol:'Orca Whirlpools',token:'WSOL',amount:'1,000 WSOL',unlimited:false},
  ];
  if(!S.keys.etherscan) return[
    {protocol:'Uniswap V3 Router',token:'USDC',amount:'Unlimited',unlimited:true},
    {protocol:'Aave V3 Pool',token:'USDC',amount:'Unlimited',unlimited:true},
    {protocol:'1inch Aggregator',token:'WETH',amount:'Unlimited',unlimited:true},
  ];
  const res=await etherscanGet({module:'logs',action:'getLogs',address:S.wallet,topic0:'0x8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925',fromBlock:'0',toBlock:'latest',page:'1',offset:'20'});
  if(!res?.result?.length) return[];
  const seen=new Set();
  return res.result.filter(l=>{const s='0x'+(l.topics[2]||'').slice(26);if(seen.has(s))return false;seen.add(s);return true;})
    .slice(0,8).map(l=>{
      const s='0x'+(l.topics[2]||'').slice(26);
      const amt=BigInt('0x'+(l.data||'0x').replace('0x','').padStart(64,'0'));
      const isUnlimited=amt>BigInt('0x'+'f'.repeat(60));
      return{protocol:s.slice(0,12)+'…',token:'ERC-20',amount:isUnlimited?'Unlimited':amt.toString().slice(0,8)+'…',unlimited:isUnlimited};
    });
}

function switchChain(c){
  S.chain=c;S.txLoaded=false;S.txData=null;S.gasData=null;
  document.querySelectorAll('.chain-btn').forEach(b=>b.classList.remove('active','eth','sol','arb','base'));
  document.getElementById('btn-'+c)?.classList.add('active',c);
  document.getElementById('chain-label').textContent=CHAINS[c].name;
  document.getElementById('block-num').textContent='—';
  fetchBlockNum();if(c!=='sol')fetchGasData();
  renderPage();
}
function showPage(p,el){
  S.page=p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  (el||document.getElementById('nav-'+p))?.classList.add('active');
  const T={inspector:'TX INSPECTOR',approvals:'TOKEN APPROVALS',stake:'STAKE / UNSTAKE',vaults:'YIELD VAULTS',swap:'TOKEN SWAP',lend:'LEND / BORROW',ai:'AI ADVISOR',portfolio:'PORTFOLIO',nfts:'NFT GALLERY',settings:'API KEYS'};
  document.getElementById('page-title').textContent=T[p]||p.toUpperCase();
  renderPage();
  if(p==='vaults'&&!S.vaultsLoaded) fetchLlamaYields();
  if(p==='portfolio') fetchPortfolio();
  if(p==='nfts') fetchNFTs();
}
async function loadWallet(){
  const raw=document.getElementById('wallet-addr').value.trim();
  if(!raw) return;
  if(raw.toLowerCase().endsWith('.eth')){
    S.ensName=raw;
    const inp=document.getElementById('wallet-addr');
    inp.placeholder='Resolving '+raw+'…';inp.value='';
    const resolved=await resolveENS(raw);
    if(resolved){
      S.wallet=resolved;
      inp.value=resolved;
      inp.placeholder='0x… or Sol address';
    } else {
      inp.value=raw;inp.placeholder='0x… or Sol address';
      return;
    }
  } else {
    S.wallet=raw;S.ensName='';
  }
  S.portfolioData=null;S.nftData=null;renderPage();
}

function renderPage(){
  const c=document.getElementById('content');if(!c)return;
  switch(S.page){
    case 'inspector':c.innerHTML=renderInspector();break;
    case 'approvals':c.innerHTML=renderApprovalsShell();setTimeout(()=>loadApprovalsData(),50);break;
    case 'stake':    c.innerHTML=renderStake();break;
    case 'vaults':   c.innerHTML=renderVaults();break;
    case 'swap':     c.innerHTML=renderSwap();break;
    case 'lend':     c.innerHTML=renderLend();break;
    case 'ai':       c.innerHTML=renderAIShell();restoreAIMessages();break;
    case 'portfolio':c.innerHTML=renderPortfolio();break;
    case 'nfts':     c.innerHTML=renderNFTs();break;
    case 'settings': c.innerHTML=renderSettings();break;
  }
}

function renderInspector(){
  const ph=S.chain==='sol'?'Solana tx signature (5UzJR…)':'Transaction hash (0x…)';

async function generateTxExplanation(){
  const tx=S.txData;
  const el=document.getElementById('explain-content');if(!el)return;
  const prompt=`Explain this ${S.chain.toUpperCase()} transaction plainly: Function="${tx.fn}", Contract="${tx.contractName||tx.contract}", Verified=${tx.verified}, Value="${tx.value||'0'}", Status="${tx.status}". Key risks: ${tx.risks.map(r=>r.label).join('; ')}. Keep under 220 words. Use plain paragraphs. Use <strong> for key terms and amounts. Flag anything dangerous clearly.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are Crypto Chaperone, a DeFi transaction safety advisor. Explain transactions clearly. Use <strong> tags. Never make financial recommendations.',messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const text=d.content?.[0]?.text||'Could not generate explanation.';
    if(el) el.innerHTML=`<div class="explain-block info">${text}</div><div class="action-row" style="margin-top:8px;"><button class="btn" onclick="askAIAboutTx()">Ask follow-up ↗</button><button class="btn btn-danger" onclick="showPage('approvals',document.getElementById('nav-approvals'))">Review approvals</button></div>`;
  }catch(e){
    if(el) el.innerHTML=`<div class="error-note">Could not generate AI explanation. Check network or add API key.</div>`;
  }
}

function restoreAIMessages(){
  const c=document.getElementById('ai-messages');if(!c)return;
  c.innerHTML=`<div class="ai-msg"><div class="ai-msg-role">chaperone</div><div class="ai-msg-body">I'm your DeFi advisor with live context on <strong>${CHAINS[S.chain].name}</strong>. ETH: <strong>$${S.prices.eth?S.prices.eth.toLocaleString():'—'}</strong> · SOL: <strong>$${S.prices.sol?S.prices.sol.toFixed(2):'—'}</strong>. Ask me anything about transactions, protocols, staking, or risks.</div></div>`
    +S.aiMessages.map(m=>`<div class="ai-msg"><div class="ai-msg-role">${m.role==='user'?'you':'chaperone'}</div><div class="ai-msg-body ${m.role==='user'?'user':''}">${m.content}</div></div>`).join('');
  c.scrollTop=c.scrollHeight;
}
async function sendAI(){
  const inp=document.getElementById('ai-input');
  if(!inp||!inp.value.trim()||S.aiLoading)return;
  const msg=inp.value.trim();inp.value='';
  S.aiMessages.push({role:'user',content:msg});
  appendAIMsg('you',msg,true);
  S.aiLoading=true;
  appendAIMsg('chaperone','<span class="spinner" style="display:inline-block;width:10px;height:10px;"></span>',false,'ai-thinking');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:`You are Crypto Chaperone, expert DeFi safety advisor. Context: chain=${CHAINS[S.chain].name}, wallet=${S.wallet}, ETH=$${S.prices.eth}, SOL=$${S.prices.sol}. Be concise, honest about risks. Never make financial recommendations. Use <strong> for emphasis. Under 250 words.`,
      messages:S.aiMessages
    })});
    const d=await r.json();
    const reply=d.content?.[0]?.text||'Error generating response.';
    S.aiMessages.push({role:'assistant',content:reply});
    document.getElementById('ai-thinking')?.remove();
    appendAIMsg('chaperone',reply,false);
  }catch(e){
    document.getElementById('ai-thinking')?.remove();
    appendAIMsg('chaperone','Connection error. Check your network.',false);
  }
  S.aiLoading=false;
}
function appendAIMsg(role,content,isUser,id){
  const c=document.getElementById('ai-messages');if(!c)return;
  const d=document.createElement('div');d.className='ai-msg';if(id)d.id=id;
  d.innerHTML=`<div class="ai-msg-role">${role}</div><div class="ai-msg-body ${isUser?'user':''}">${content}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
